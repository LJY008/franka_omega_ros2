
controller_manager:
  ros__parameters:
    update_rate: 1000  # Hz

    joint_position_example_controller:
      type: franka_example_controllers/JointPositionExampleController

    joint_velocity_example_controller:
      type: franka_example_controllers/JointVelocityExampleController

    joint_impedance_example_controller:
      type: franka_example_controllers/JointImpedanceExampleController

    joint_state_broadcaster:
      type: joint_state_broadcaster/JointStateBroadcaster
    
    joint_impedance_with_ik_example_controller:
      type: franka_example_controllers/JointImpedanceWithIKExampleController
    
    moveit_franka_controller:
      type: franka_example_controllers/JointImpedanceMoveItControllerG

joint_position_example_controller:
  ros__parameters:
    gazebo: true

joint_velocity_example_controller:
  ros__parameters:
    gazebo: true
  
joint_impedance_example_controller:
  ros__parameters:
    k_gains:
      - 24.0
      - 24.0
      - 24.0
      - 24.0
      - 10.0
      - 6.0
      - 2.0
    d_gains:
      - 2.0
      - 2.0
      - 2.0
      - 1.0
      - 1.0
      - 1.0
      - 0.5
    

joint_impedance_with_ik_example_controller:
  ros__parameters:
    k_gains:
      - 600.0
      - 600.0
      - 600.0
      - 600.0
      - 250.0
      - 150.0
      - 50.0
    d_gains:
      - 30.0
      - 30.0
      - 30.0
      - 30.0
      - 10.0
      - 10.0
      - 5.
    arm_id: "fr3"
    load_gripper: true

moveit_franka_controller:
  ros__parameters:
    arm_id: "fr3"    
    ee_pose_topic: "/fd/ee_pose"
    ik_timeout: 0.2
    max_joint_velocity: 0.2
    use_real_robot: false
    joints:
      - fr3_joint1
      - fr3_joint2
      - fr3_joint3
      - fr3_joint4
      - fr3_joint5
      - fr3_joint6
      - fr3_joint7
    command_interfaces:
      - velocity
    state_interfaces:
      - position
      - velocity
      - effort
    k_gains:
      - 20.0
      - 20.0
      - 20.0
      - 20.0
      - 15.0
      - 15.0
      - 5.0
    d_gains:
      - 3.0
      - 3.0
      - 3.0
      - 3.0
      - 1.0
      - 1.0
      - 0.5